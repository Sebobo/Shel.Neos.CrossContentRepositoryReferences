Neos:
  Neos:
    nodeTypes:
      presets:
        properties:
          crossContentRepositoryReference:
            type: Shel\Neos\CrossContentRepositoryReferences\Domain\Model\CrossContentRepositoryReference
            ui:
              label: 'Cross Content Repository Reference'
              reloadIfChanged: true
              inspector:
                group: 'links'
                editor: 'Shel.Neos.CrossContentRepositoryReferences/Inspector/Editors/SelectBoxEditor'
                editorOptions:
                  multiple: false
                  allowEmpty: true
                  placeholder: 'Select a node'
                  dataSourceIdentifier: 'cross-content-repository-references'
                  dataSourceDisableCaching: true
                  dataSourceAdditionalData:
                    # Starting point including the content repository id, using the
                    # pattern: /<contentRepositoryId>/<RootNodeType>/<siteName>
                    startingPoint: '/default/<Neos.Neos:Sites>'
                    # Optional: limit selectable node types. Defaults to "Neos.Neos:Document".
                    nodeTypes: ['Neos.Neos:Document']
                    # Optional: override the dimension space point as a JSON object.
                    # When omitted, the dimension space point of the edited node is converted to be compatible with the target content repository.
                    # dimensionValues: '{"language":"de"}'
                    # Optional: name of a node property holding an image asset, used
                    # to render small preview thumbnails next to the options.
                    imageProperty: 'image'
                    # Optional: maximum width (in px) of the generated preview thumbnail. Defaults to 100.
                    # thumbnailWidth: 100
          crossContentRepositoryReferences:
            type: array<Shel\Neos\CrossContentRepositoryReferences\Dto\CrossContentRepositoryReference>
            ui:
              label: 'Cross Content Repository References'
              reloadIfChanged: true
              inspector:
                group: 'links'
                editor: 'Shel.Neos.CrossContentRepositoryReferences/Inspector/Editors/SelectBoxEditor'
                editorOptions:
                  multiple: true
                  allowEmpty: true
                  placeholder: 'Select nodes'
                  dataSourceIdentifier: 'cross-content-repository-references'
                  dataSourceDisableCaching: true
                  dataSourceAdditionalData:
                    startingPoint: '/default/<Neos.Neos:Sites>'
                    nodeTypes: ['Neos.Neos:Document']
                    imageProperty: 'image'
                    # Additional options: see above
